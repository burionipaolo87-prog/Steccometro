    background-size: 280px auto;
    background-repeat: repeat;
    color: var(--text);
    height: 100dvh;
    overflow: hidden;
    position: relative;
  }
 
  /* dark overlay on camo image */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.38);
    pointer-events: none;
    z-index: 0;
  }
 
  .app {
    position: relative; z-index: 1;
    display: flex; flex-direction: column;
    height: 100dvh;
    padding-top: var(--safe-top);
    padding-bottom: var(--safe-bot);
  }
 
  /* HEADER */
  .header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 10px 16px 8px;
    border-bottom: 1px solid var(--border);
    background: rgba(0,0,0,0.72);
    backdrop-filter: blur(4px);
    flex-shrink: 0;
  }
 
  .header-star {
    font-size: 28px; line-height: 1;
  }
 
  .header-title {
    font-size: 24px; font-weight: 900; letter-spacing: 4px;
    color: var(--gold); text-transform: uppercase; text-shadow: 0 2px 8px rgba(0,0,0,0.8);
  }
 
  .header-right { width: 36px; text-align: right; }
 
  /* VIEWS */
  .view { display: none; flex-direction: column; flex: 1; overflow: hidden; }
  .view.active { display: flex; }
 
  /* LIST VIEW */
  .missions-list {
    flex: 1; overflow-y: auto; padding: 12px;
    display: flex; flex-direction: column; gap: 10px;
  }
 
  .mission-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 12px 14px;
    display: flex; align-items: center; gap: 12px;
    cursor: pointer;
    transition: background 0.15s;
  }
  .mission-card:active { background: rgba(245,197,24,0.1); }
 
  .mission-card-flag { font-size: 28px; line-height: 1; flex-shrink: 0; }
  .mission-card-info { flex: 1; min-width: 0; }
  .mission-card-name {
    font-size: 17px; font-weight: 900; color: var(--gold);
    letter-spacing: 1px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .mission-card-sub { font-size: 13px; color: var(--textDim); margin-top: 3px; font-weight: bold; }
  .mission-card-arrow { color: var(--textDim); font-size: 18px; }
 
  .btn-add {
    position: fixed; bottom: calc(20px + var(--safe-bot)); right: 20px;
    width: 52px; height: 52px; border-radius: 50%;
    background: var(--gold); color: var(--camo5);
    font-size: 28px; font-weight: bold;
    border: none; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 2px 12px rgba(0,0,0,0.5);
    z-index: 10;
    transition: transform 0.1s;
  }
  .btn-add:active { transform: scale(0.93); }
  .btn-totale {
    position: fixed; bottom: calc(20px + var(--safe-bot)); left: 20px;
    height: 44px; padding: 0 18px;
    border-radius: 22px;
    background: rgba(10,10,10,0.88); color: var(--gold);
    font-size: 14px; font-weight: 900; letter-spacing: 2px;
    border: 2px solid var(--gold); cursor: pointer;
    z-index: 10; font-family: 'Courier New', monospace;
    transition: transform 0.1s;
    box-shadow: 0 2px 12px rgba(0,0,0,0.5);
  }
  .btn-totale:active { transform: scale(0.95); }
 
  .empty-state {
    text-align: center; padding: 40px 20px;
    color: var(--textDim); font-size: 13px; line-height: 1.8;
  }
  .empty-star { font-size: 40px; margin-bottom: 8px; }
 
  /* FORM VIEW */
  .form-scroll { flex: 1; overflow-y: auto; padding: 10px 14px; }
 
  .form-group { margin-bottom: 10px; }
  .form-label {
    font-size: 12px; letter-spacing: 2px; color: var(--gold);
    text-transform: uppercase; margin-bottom: 4px; display: block;
  }
  .form-row { display: flex; gap: 8px; align-items: flex-start; }
 
  input, select {
    width: 100%;
    background: rgba(26,36,16,0.9);
    border: 1px solid var(--border);
    border-radius: 4px;
    color: var(--text);
    font-family: 'Courier New', monospace;
    font-size: 15px;
    padding: 9px 10px; font-weight: bold;
    outline: none;
    -webkit-appearance: none;
  }
  input:focus, select:focus { border-color: var(--gold); }
  select option { background: var(--camo1); }
 
  .flag-display {
    font-size: 28px; line-height: 38px; flex-shrink: 0;
    width: 42px; text-align: center;
    background: rgba(26,36,16,0.9);
    border: 1px solid var(--border);
    border-radius: 4px;
  }
 
  /* PAUSES */
  .pause-list { display: flex; flex-direction: column; gap: 6px; margin-bottom: 6px; }
  .pause-item {
    display: flex; gap: 6px; align-items: center;
    background: rgba(26,36,16,0.6);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 5px 8px;
  }
  .pause-item input { flex: 1; min-width: 0; }
  .btn-rm-pause {
    background: none; border: none; color: var(--red);
    font-size: 18px; cursor: pointer; padding: 0 4px; flex-shrink: 0;
  }
  .btn-add-pause {
    background: none; border: 1px solid var(--border);
    border-radius: 4px; color: var(--gold);
    font-size: 12px; padding: 5px 10px; cursor: pointer;
    letter-spacing: 1px; font-family: 'Courier New', monospace;
    width: 100%;
  }
 
  /* ACTION BUTTONS */
  .form-actions {
    display: flex; gap: 8px; padding: 10px 14px;
    border-top: 1px solid var(--border);
    flex-shrink: 0;
  }
  .btn { flex: 1; padding: 10px; border-radius: 4px; border: none; cursor: pointer; font-family: 'Courier New', monospace; font-size: 15px; font-weight: 900; letter-spacing: 1px; }
  .btn-primary { background: var(--gold); color: var(--camo5); }
  .btn-primary:active { background: var(--goldDark); }
  .btn-danger { background: transparent; border: 1px solid var(--red); color: var(--red); }
  .btn-back { background: transparent; border: 1px solid var(--border); color: var(--textDim); }
 
  /* DETAIL VIEW */
  .detail-scroll { flex: 1; overflow-y: auto; padding: 8px 12px; }
 
  .detail-header {
    display: flex; align-items: center; gap: 10px;
    margin-bottom: 10px;
  }
  .detail-flag { font-size: 36px; }

  if (start > end) { alert('La data di inizio deve essere prima della fine.'); return; }
 
  const pauses = pauseItems.filter(p => p.from && p.to && p.from <= p.to);
 
  if (editingId) {
    const idx = missions.findIndex(x => x.id === editingId);
    if (idx >= 0) missions[idx] = { id: editingId, name, nation, city, start, end, pay, pauses };

// ─── CALC ────────────────────────────────────────────────────────────
function dateToMs(s) { return new Date(s+'T00:00:00').getTime(); }
 
function fmt(n) {
  return Number(n).toLocaleString('it-IT', {minimumFractionDigits:2, maximumFractionDigits:2});
}
 
function calcPauseDays(pauses, start, end) {
  if (!pauses || !pauses.length) return 0;
  let total = 0;
  const s = dateToMs(start), e = dateToMs(end);
  pauses.forEach(p => {
    if (!p.from || !p.to) return;
    const ps = Math.max(dateToMs(p.from), s);
    const pe = Math.min(dateToMs(p.to), e);
    if (pe >= ps) total += Math.round((pe - ps) / 86400000) + 1;
  });
  return total;
}
 
function calcTotalDays(m) {
  if (!m.start || !m.end) return 0;
  return Math.round((dateToMs(m.end) - dateToMs(m.start)) / 86400000) + 1;
}
 
function calcWorkDays(m) {
  return Math.max(0, calcTotalDays(m) - calcPauseDays(m.pauses, m.start, m.end));
}
 
function calcDaysDone(m) {
  if (!m.start || !m.end) return 0;
  const now = Date.now();
  const s = dateToMs(m.start), e = dateToMs(m.end);
  if (now < s) return 0;
  if (now > e) return calcWorkDays(m);
  const calendarDone = Math.round((now - s) / 86400000);
  const pauses = m.pauses||[];
  let pauseConsumed = 0;
  const today = new Date().toISOString().split('T')[0];
  pauses.forEach(p => {
    if (!p.from || !p.to) return;
    const ps = Math.max(dateToMs(p.from), s);
    const pe = Math.min(dateToMs(p.to), dateToMs(today));
    if (pe >= ps) pauseConsumed += Math.round((pe - ps) / 86400000) + 1;
  });
  return Math.max(0, calendarDone - pauseConsumed);
}
 
function calcPercent(m) {
  const total = calcWorkDays(m);
  if (!total) return 0;
  return Math.min(100, Math.round(calcDaysDone(m) / total * 100));
}
 
function calcEarned(m) {
  if (!m.start || !m.end || !m.pay) return 0;
  const now = Date.now();
  const s = dateToMs(m.start);
  const e = dateToMs(m.end) + 86400000 - 1;
  if (now < s) return 0;
  const totalWork = calcWorkDays(m);
  if (totalWork <= 0) return 0;
  const payPerDay = m.pay;
  // Calculate work-seconds elapsed, excluding pauses
  const cap = Math.min(now, e);
  let totalCalSec = (cap - s) / 1000;
  // subtract pause seconds that have elapsed
  (m.pauses||[]).forEach(p => {
    if (!p.from || !p.to) return;
    const ps = dateToMs(p.from);
    const pe = dateToMs(p.to) + 86400000 - 1;
    const os = Math.max(ps, s);
    const oe = Math.min(pe, cap);
    if (oe > os) totalCalSec -= (oe - os) / 1000;
  });
  totalCalSec = Math.max(0, totalCalSec);
  // work seconds in total calendar = totalWork days * 86400
  const totalWorkSec = totalWork * 86400;
  return Math.min(payPerDay * totalWork, (payPerDay * totalWork) * (totalCalSec / totalWorkSec));
}
 
// ─── DETAIL ──────────────────────────────────────────────────────────
function openDetail(id) {
  editingId = id;

    if (mm) updateCounters(mm);
  }, 1000);
}
 
function renderDetail(m) {
  const flag = getFlagFor(m.nation);
  const totalDays = calcTotalDays(m);
  const workDays = calcWorkDays(m);
  const pauseDays = calcPauseDays(m.pauses, m.start, m.end);
  const total = (m.pay||0) * workDays;
  const pct = calcPercent(m);
  const done = calcDaysDone(m);
  const remaining = Math.max(0, workDays - done);
 
  const pausesHtml = (m.pauses||[]).length
    ? (m.pauses||[]).map(p => `<span class="pause-chip">${p.from} → ${p.to}</span>`).join('')
    : '<span style="color:var(--textDim);font-size:11px">Nessuna pausa</span>';
 
  document.getElementById('detailContent').innerHTML = `
    <div class="detail-header">
      <div class="detail-flag">${flag}</div>
      <div>
        <div class="detail-title">${m.name||'MISSIONE'}</div>
        <div class="detail-sub">${m.city||''}${m.city&&m.nation?' · ':''}${m.nation||''}</div>
        <div class="detail-sub">${m.start||'?'} → ${m.end||'?'}</div>
      </div>
    </div>
 
    <div class="timeline-section">
      <div class="timeline-label">⬛ Timeline · ${totalDays} gg cal. · ${pauseDays} gg pausa</div>
      <div style="display:flex;align-items:center;gap:12px">
        <div style="flex-shrink:0;position:relative;width:90px;height:90px">
          <canvas id="pieChart" width="90" height="90"></canvas>
          <div id="piePct" style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:900;color:var(--gold);pointer-events:none">${pct}%</div>
        </div>
        <div style="flex:1">
          <div style="display:flex;align-items:center;gap:6px;margin-bottom:8px">
            <div style="width:12px;height:12px;border-radius:2px;background:#2dc653;flex-shrink:0"></div>
            <span style="font-size:13px;color:var(--textDim);font-weight:bold">Passati:</span>
            <span style="font-size:16px;font-weight:900;color:#2dc653" id="dtDone">${done}</span>
            <span style="font-size:13px;color:var(--textDim);font-weight:bold">gg</span>
          </div>
          <div style="display:flex;align-items:center;gap:6px;margin-bottom:8px">
            <div style="width:12px;height:12px;border-radius:2px;background:#e63946;flex-shrink:0"></div>
            <span style="font-size:13px;color:var(--textDim);font-weight:bold">Rimasti:</span>
            <span style="font-size:16px;font-weight:900;color:#e63946" id="dtRem">${remaining}</span>
            <span style="font-size:13px;color:var(--textDim);font-weight:bold">gg</span>
          </div>
          <div style="display:flex;align-items:center;gap:6px">
            <div style="width:12px;height:12px;border-radius:2px;background:#666;flex-shrink:0"></div>
            <span style="font-size:13px;color:var(--textDim);font-weight:bold">Pausa:</span>
            <span style="font-size:16px;font-weight:900;color:#999">${pauseDays}</span>
            <span style="font-size:13px;color:var(--textDim);font-weight:bold">gg</span>
          </div>
        </div>
      </div>
    </div>
 
    <div class="counter-section">
      <div class="timeline-label">💰 Incassato / Totale</div>
      <div class="counter-row">
        <div class="counter-box">
          <div class="counter-val" id="dtEarned">€0.00</div>
          <div class="counter-lbl">incassato ora</div>
        </div>
        <div class="counter-box">
          <div class="counter-val counter-total-val">€${fmt(total)}</div>
          <div class="counter-lbl">totale missione</div>
        </div>
      </div>
      <div style="margin-top:6px;font-size:10px;color:var(--textDim);text-align:center">
        €${fmt(m.pay||0)}/g · ${workDays} gg lav. · €${(((m.pay||0)*workDays)/(workDays*86400)).toFixed(4)}/sec
      </div>
    </div>
 
    <div class="pauses-section">
      <div class="pauses-title">🟥 Pause</div>
      ${pausesHtml}
    </div>
  `;
  updateCounters(m);
}
 
function drawPie(pct, pauseFrac) {
  const canvas = document.getElementById('pieChart');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;
  const cx = W/2, cy = H/2, r = W/2 - 3;
  ctx.clearRect(0,0,W,H);
  const TAU = Math.PI * 2;
  const start = -Math.PI/2;
  const doneFrac = pct/100;
  const pauseF = Math.min(pauseFrac, 1 - doneFrac);
  const remFrac = Math.max(0, 1 - doneFrac - pauseF);
 
  function arc(from, to, color) {
    if (to <= from) return;
    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.arc(cx, cy, r, from, to);
    ctx.closePath();
    ctx.fillStyle = color;
    ctx.fill();
  }
  // background full circle grey
  ctx.beginPath(); ctx.arc(cx,cy,r,0,TAU); ctx.fillStyle='#333'; ctx.fill();
  // pause slice (grey, after done)
  arc(start + doneFrac*TAU, start + (doneFrac+pauseF)*TAU, '#555');
  // remaining slice (red)
  if (remFrac > 0) arc(start + (doneFrac+pauseF)*TAU, start + TAU, '#e63946');
  // done slice (green)
  if (doneFrac > 0) arc(start, start + doneFrac*TAU, '#2dc653');
  // center hole
  ctx.beginPath(); ctx.arc(cx,cy,r*0.48,0,TAU); ctx.fillStyle='rgba(10,10,10,0.9)'; ctx.fill();
}
 
function updateCounters(m) {
  const earned = calcEarned(m);
  const el = document.getElementById('dtEarned');
  if (el) el.textContent = '€' + fmt(earned);
 
  const pct = calcPercent(m);
  const done = calcDaysDone(m);
  const workDays = calcWorkDays(m);
  const totalDays = calcTotalDays(m);
  const pauseDays = calcPauseDays(m.pauses, m.start, m.end);
  const remaining = Math.max(0, workDays - done);
  const pauseFrac = totalDays > 0 ? pauseDays/totalDays : 0;
 
  drawPie(pct, pauseFrac);
  const piePct = document.getElementById('piePct');
  if (piePct) piePct.textContent = pct + '%';
  const dtDone = document.getElementById('dtDone');
  if (dtDone) dtDone.textContent = done;
  const dtRem = document.getElementById('dtRem');
  if (dtRem) dtRem.textContent = remaining;
}
 
// ─── TOTALE VIEW ─────────────────────────────────────────────────────
function openTotale() {
  if (detailTimer) { clearInterval(detailTimer); detailTimer = null; }
  document.getElementById('headerTitle').textContent = 'RIEPILOGO';
  document.getElementById('btnAdd').style.display = 'none';
  document.getElementById('btnTotale').style.display = 'none';
  showView('viewTotale');
  renderTotale();
  detailTimer = setInterval(renderTotale, 1000);
}
 
function renderTotale() {
  const now = Date.now();
  let grandTotal = 0;
  let rows = '';
  missions.forEach(m => {
    const earned = calcEarned(m);
    const workDays = calcWorkDays(m);
    const total = (m.pay||0) * workDays;
    const flag = getFlagFor(m.nation);
    const ended = m.end ? (dateToMs(m.end) + 86400000 - 1 < now) : false;
    const pct = calcPercent(m);
    grandTotal += earned;
    rows += `
      <div style="background:var(--card);border:1px solid var(--border);border-radius:6px;padding:10px 12px;margin-bottom:8px;">
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px;">
          <span style="font-size:26px;line-height:1">${flag}</span>
          <div style="flex:1;min-width:0">
            <div style="font-size:16px;font-weight:900;color:var(--gold);letter-spacing:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${m.name||'Senza nome'}</div>
            <div style="font-size:12px;color:var(--textDim);font-weight:bold">${m.city||''}${m.city&&m.nation?' · ':''}${m.nation||''}</div>
          </div>
          <div style="text-align:right;flex-shrink:0">
            <div style="font-size:11px;color:${ended?'var(--green)':'var(--gold)'};font-weight:900">${ended?'✓ CONCLUSA':'▶ IN CORSO'}</div>
            <div style="font-size:11px;color:var(--textDim)">${pct}%</div>
          </div>
        </div>
        <div style="display:flex;gap:8px">
          <div style="flex:1;text-align:center;border:1px solid var(--border);border-radius:4px;padding:6px 4px">
            <div style="font-size:18px;font-weight:900;color:var(--gold)">€${fmt(earned)}</div>
            <div style="font-size:10px;color:var(--textDim);font-weight:bold;text-transform:uppercase;letter-spacing:1px">incassato</div>
          </div>
          <div style="flex:1;text-align:center;border:1px solid var(--border);border-radius:4px;padding:6px 4px">
            <div style="font-size:18px;font-weight:900;color:var(--textDim)">€${fmt(total)}</div>
            <div style="font-size:10px;color:var(--textDim);font-weight:bold;text-transform:uppercase;letter-spacing:1px">totale</div>
          </div>
        </div>
      </div>`;
  });
 
  if (!missions.length) {
    rows = '<div style="text-align:center;padding:40px 20px;color:var(--textDim);font-size:14px">Nessuna missione.</div>';
  }
 
  document.getElementById('totaleContent').innerHTML = `
    ${rows}
    <div style="background:rgba(245,197,24,0.12);border:2px solid var(--gold);border-radius:8px;padding:14px 16px;margin-top:4px;text-align:center">
      <div style="font-size:11px;color:var(--gold);letter-spacing:3px;font-weight:900;text-transform:uppercase;margin-bottom:6px">★ TOTALE GUADAGNATO ★</div>
      <div style="font-size:32px;font-weight:900;color:var(--gold);text-shadow:0 2px 8px rgba(0,0,0,0.8)">€${fmt(grandTotal)}</div>
      <div style="font-size:11px;color:var(--textDim);margin-top:4px">${missions.length} mission${missions.length!==1?'i':'e'} · aggiornato in tempo reale</div>
    </div>
  `;
}
 
// ─── START ───────────────────────────────────────────────────────────
init();
</script>
