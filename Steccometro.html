    background-size: 280px auto;
    background-repeat: repeat;
    color: var(--text);
    height: 100dvh;
    overflow: hidden;
    position: relative;
  }

  /* dark overlay on camo image */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.38);
    pointer-events: none;
    z-index: 0;
  }

  .app {
    position: relative; z-index: 1;
    display: flex; flex-direction: column;
    height: 100dvh;
    padding-top: var(--safe-top);
    padding-bottom: var(--safe-bot);
  }

  /* HEADER */
  .header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 10px 16px 8px;
    border-bottom: 1px solid var(--border);
    background: rgba(0,0,0,0.72);
    backdrop-filter: blur(4px);
    flex-shrink: 0;
  }

  .header-star {
    font-size: 28px; line-height: 1;
  }

  .header-title {
    font-size: 24px; font-weight: 900; letter-spacing: 4px;
    color: var(--gold); text-transform: uppercase; text-shadow: 0 2px 8px rgba(0,0,0,0.8);
  }

  .header-right { width: 36px; text-align: right; }

  /* VIEWS */
  .view { display: none; flex-direction: column; flex: 1; overflow: hidden; }
  .view.active { display: flex; }

  /* LIST VIEW */
  .missions-list {
    flex: 1; overflow-y: auto; padding: 12px;
    display: flex; flex-direction: column; gap: 10px;
  }

  .mission-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 12px 14px;
    display: flex; align-items: center; gap: 12px;
    cursor: pointer;
    transition: background 0.15s;
  }
  .mission-card:active { background: rgba(245,197,24,0.1); }

  .mission-card-flag { font-size: 28px; line-height: 1; flex-shrink: 0; }
  .mission-card-info { flex: 1; min-width: 0; }
  .mission-card-name {
    font-size: 17px; font-weight: 900; color: var(--gold);
    letter-spacing: 1px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .mission-card-sub { font-size: 13px; color: var(--textDim); margin-top: 3px; font-weight: bold; }
  .mission-card-arrow { color: var(--textDim); font-size: 18px; }

  .btn-add {
    position: fixed; bottom: calc(20px + var(--safe-bot)); right: 20px;
    width: 52px; height: 52px; border-radius: 50%;
    background: var(--gold); color: var(--camo5);
    font-size: 28px; font-weight: bold;
    border: none; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 2px 12px rgba(0,0,0,0.5);
    z-index: 10;
    transition: transform 0.1s;
  }
  .btn-add:active { transform: scale(0.93); }
  .btn-totale {
    position: fixed; bottom: calc(20px + var(--safe-bot)); left: 20px;
    height: 44px; padding: 0 18px;
    border-radius: 22px;
    background: rgba(10,10,10,0.88); color: var(--gold);
    font-size: 14px; font-weight: 900; letter-spacing: 2px;
    border: 2px solid var(--gold); cursor: pointer;
    z-index: 10; font-family: 'Courier New', monospace;
    transition: transform 0.1s;
    box-shadow: 0 2px 12px rgba(0,0,0,0.5);
  }
  .btn-totale:active { transform: scale(0.95); }
  .btn-map {
    position: fixed; bottom: calc(20px + var(--safe-bot)); left: 50%;
    transform: translateX(-50%);
    width: 52px; height: 52px; border-radius: 50%;
    background: #1565c0; color: #fff;
    font-size: 24px;
    border: 2px solid #42a5f5; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 2px 12px rgba(0,0,0,0.5);
    z-index: 10;
    transition: transform 0.1s;
  }
  .btn-map:active { transform: translateX(-50%) scale(0.93); }
  .map-pin {
    position: absolute;
    transform: translate(-50%, -100%);
    font-size: 22px;
    cursor: pointer;
    filter: drop-shadow(0 2px 3px rgba(0,0,0,0.8));
    z-index: 5;
  }
  .map-tooltip {
    position: absolute;
    background: rgba(0,0,0,0.88);
    border: 1px solid var(--gold);
    border-radius: 4px;
    padding: 4px 8px;
    font-size: 11px;
    color: var(--gold);
    font-weight: bold;
    white-space: nowrap;
    pointer-events: none;
    transform: translate(-50%, -110%);
    z-index: 10;
  }

  .empty-state {
    text-align: center; padding: 40px 20px;
    color: var(--textDim); font-size: 13px; line-height: 1.8;
  }
  .empty-star { font-size: 40px; margin-bottom: 8px; }

  /* FORM VIEW */
  .form-scroll { flex: 1; overflow-y: auto; padding: 10px 14px; }

  .form-group { margin-bottom: 10px; }
  .form-label {
    font-size: 12px; letter-spacing: 2px; color: var(--gold);
    text-transform: uppercase; margin-bottom: 4px; display: block;
    background: rgba(0,0,0,0.72); padding: 3px 8px; border-radius: 3px;
  }
  .form-row { display: flex; gap: 8px; align-items: flex-start; }

  input, select {
    width: 100%;
    background: rgba(26,36,16,0.9);
    border: 1px solid var(--border);
    border-radius: 4px;
    color: var(--text);
    font-family: 'Courier New', monospace;
    font-size: 15px;
    padding: 9px 10px; font-weight: bold;
    outline: none;
    -webkit-appearance: none;
  }
  input:focus, select:focus { border-color: var(--gold); }
  select option { background: var(--camo1); }

  .flag-display {
    font-size: 28px; line-height: 38px; flex-shrink: 0;
    width: 42px; text-align: center;
    background: rgba(26,36,16,0.9);
    border: 1px solid var(--border);
    border-radius: 4px;
  }

  /* PAUSES */
  .pause-list { display: flex; flex-direction: column; gap: 6px; margin-bottom: 6px; }
  .pause-item {
    display: flex; gap: 6px; align-items: center;
    background: rgba(26,36,16,0.6);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 5px 8px;
  }
  .pause-item input { flex: 1; min-width: 0; }
  .btn-rm-pause {
    background: none; border: none; color: var(--red);
    font-size: 18px; cursor: pointer; padding: 0 4px; flex-shrink: 0;
  }
  .btn-add-pause {

}
function save() {
  localStorage.setItem('stecco_missions', JSON.stringify(missions));
}
function esc(value) {
  return String(value ?? '').replace(/[&<>'"]/g, ch => ({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[ch]));
}

  });
  renderList();
}

// ─── LIST ────────────────────────────────────────────────────────────
function renderList() {
  const el = document.getElementById('missionsList');
  el.innerHTML = '';
  if (!missions.length) {
    el.innerHTML = '<div class="empty-state"><div class="empty-star">⭐</div>Nessuna missione.<br>Premi + per crearne una.</div>';
    return;
  }
  missions.forEach(m => {
    const flag = getFlagFor(m.nation);
    const days = calcWorkDays(m);
    const pct = calcPercent(m);
    const nameSafe = esc(m.name || 'Senza nome');
    const citySafe = esc(m.city || '');
    const nationSafe = esc(m.nation || '');
    const div = document.createElement('div');
    div.className = 'mission-card';
    div.onclick = () => openDetail(m.id);
    div.innerHTML = `
      <div class="mission-card-flag">${flag}</div>
      <div class="mission-card-info">

        <div class="mission-card-sub">${citySafe}${m.city&&m.nation?' · ':''}${nationSafe}</div>

      <div style="font-size:20px;color:${pct>=100?'#27ae60':pct>0?'#f5c518':'#555'}">›</div>

  });
}

// ─── SAVE ────────────────────────────────────────────────────────────
function saveMission() {
  const name = document.getElementById('fName').value.trim();
  const nation = document.getElementById('fNation').value;
  const city = document.getElementById('fCity').value.trim();
  const start = toInternal(document.getElementById('fStart').value);
  const end = toInternal(document.getElementById('fEnd').value);
  const rawPay = document.getElementById('fPay').value.replace(',', '.');
  const pay = rawPay === '' ? 0 : Number(rawPay);

  if (!name) { alert('Inserisci il nome della missione.'); return; }
  if (!start || !end) { alert('Inserisci le date di inizio e fine.'); return; }
  if (start > end) { alert('La data di inizio deve essere prima della fine.'); return; }
  if (!Number.isFinite(pay) || pay < 0) { alert('La paga giornaliera non può essere negativa o non valida.'); return; }

  const invalidPause = pauseItems.some(p => p.from && p.to && p.from > p.to);
  if (invalidPause) { alert('Controlla le pause: la data iniziale non può essere dopo quella finale.'); return; }
  const pauses = pauseItems.filter(p => p.from && p.to && p.from <= p.to);

  if (editingId) {
    const idx = missions.findIndex(x => x.id === editingId);
    if (idx >= 0) missions[idx] = { id: editingId, name, nation, city, start, end, pay, pauses };
  } else {
    missions.push({ id: Date.now().toString(), name, nation, city, start, end, pay, pauses });
  }
  save();
  goList();
}

// ─── DELETE ──────────────────────────────────────────────────────────
function deleteMission() {
  if (!confirm('Eliminare questa missione?')) return;
  missions = missions.filter(x => x.id !== editingId);
  save();
  editingId = null;
  goList();
}

// ─── CALC ────────────────────────────────────────────────────────────
function dateToMs(s) { return new Date(s+'T00:00:00').getTime(); }

function fmt(n) {
  const num = Number(n);
  const parts = num.toFixed(2).split('.');
  parts[0] = parts[0].replace(/\B(?=(\d{3})+(?!\d))/g, '.');
  return parts.join(',');
}

function calcPauseDays(pauses, start, end) {
  if (!pauses || !pauses.length) return 0;
  let total = 0;
  const s = dateToMs(start), e = dateToMs(end);
  pauses.forEach(p => {
    if (!p.from || !p.to) return;
    const ps = Math.max(dateToMs(p.from), s);
    const pe = Math.min(dateToMs(p.to), e);
    if (pe >= ps) total += Math.round((pe - ps) / 86400000) + 1;
  });
  return total;
}

function calcTotalDays(m) {
  if (!m.start || !m.end) return 0;
  return Math.round((dateToMs(m.end) - dateToMs(m.start)) / 86400000) + 1;
}

function calcWorkDays(m) {
  return Math.max(0, calcTotalDays(m) - calcPauseDays(m.pauses, m.start, m.end));
}

function calcDaysDone(m) {
  if (!m.start || !m.end) return 0;
  const now = Date.now();
  const s = dateToMs(m.start), e = dateToMs(m.end);
  if (now < s) return 0;
  if (now > e) return calcTotalDays(m);
  // Giorni calendari dall'inizio a oggi incluso (pausa compresa)
  return Math.round((now - s) / 86400000) + 1;
}

function calcPercent(m) {
  const total = calcTotalDays(m);
  if (!total) return 0;
  return Math.min(100, Math.round(calcDaysDone(m) / total * 100));
}

function calcEarned(m) {
  if (!m.start || !m.end || !m.pay) return 0;
  const now = Date.now();
  const s = dateToMs(m.start);
  const e = dateToMs(m.end) + 86400000 - 1;
  if (now < s) return 0;
  const totalWork = calcWorkDays(m);
  if (totalWork <= 0) return 0;
  const payPerDay = m.pay;
  // Calculate work-seconds elapsed, excluding pauses
  const cap = Math.min(now, e);
  let totalCalSec = (cap - s) / 1000;
  // subtract pause seconds that have elapsed
  (m.pauses||[]).forEach(p => {
    if (!p.from || !p.to) return;
    const ps = dateToMs(p.from);
    const pe = dateToMs(p.to) + 86400000 - 1;
    const os = Math.max(ps, s);
    const oe = Math.min(pe, cap);
    if (oe > os) totalCalSec -= (oe - os) / 1000;
  });
  totalCalSec = Math.max(0, totalCalSec);
  // work seconds in total calendar = totalWork days * 86400
  const totalWorkSec = totalWork * 86400;
  return Math.min(payPerDay * totalWork, (payPerDay * totalWork) * (totalCalSec / totalWorkSec));
}

function drawPie(pct, pauseFrac) {
  const canvas = document.getElementById('pieChart');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;
  const cx = W/2, cy = H/2, r = W/2 - 3;
  ctx.clearRect(0,0,W,H);
  const TAU = Math.PI * 2;
  const start = -Math.PI/2;
  const doneFrac = pct/100;
  const pauseF = Math.min(pauseFrac, 1 - doneFrac);
  const remFrac = Math.max(0, 1 - doneFrac - pauseF);

  function arc(from, to, color) {
    if (to <= from) return;
    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.arc(cx, cy, r, from, to);
    ctx.closePath();
    ctx.fillStyle = color;
    ctx.fill();
  }
  // background full circle grey
  ctx.beginPath(); ctx.arc(cx,cy,r,0,TAU); ctx.fillStyle='#333'; ctx.fill();
  // pause slice (grey, after done)
  arc(start + doneFrac*TAU, start + (doneFrac+pauseF)*TAU, '#555');
  // remaining slice (red)
  if (remFrac > 0) arc(start + (doneFrac+pauseF)*TAU, start + TAU, '#e63946');
  // done slice (green)
  if (doneFrac > 0) arc(start, start + doneFrac*TAU, '#2dc653');
  // center hole
  ctx.beginPath(); ctx.arc(cx,cy,r*0.48,0,TAU); ctx.fillStyle='rgba(10,10,10,0.9)'; ctx.fill();
}

function updateCounters(m) {
  const earned = calcEarned(m);
  const el = document.getElementById('dtEarned');
  if (el) el.textContent = '€' + fmt(earned);

  const pct = calcPercent(m);
  const done = calcDaysDone(m);
  const workDays = calcWorkDays(m);
  const totalDays = calcTotalDays(m);
  const pauseDays = calcPauseDays(m.pauses, m.start, m.end);
  const remaining = Math.max(0, Math.round((dateToMs(m.end) - Date.now()) / 86400000));
  const pauseFrac = totalDays > 0 ? pauseDays/totalDays : 0;

  drawPie(pct, pauseFrac);
  const piePct = document.getElementById('piePct');
  if (piePct) piePct.textContent = pct + '%';
  const dtDone = document.getElementById('dtDone');
  if (dtDone) dtDone.textContent = done;
  const dtRem = document.getElementById('dtRem');
  if (dtRem) dtRem.textContent = remaining;
}

// ─── DATE FORMAT HELPERS ─────────────────────────────────────────────
// Internal: YYYY-MM-DD, Display: DD/MM/YYYY
function toDisplay(iso) {
  if (!iso || iso.length < 10) return iso || '';
  const [y,m,d] = iso.split('-');
  if (!y || !m || !d) return iso;
  return d + '/' + m + '/' + y;
}
function toInternal(dmy) {
  if (!dmy) return '';
  // Already YYYY-MM-DD?
  if (/^\d{4}-\d{2}-\d{2}$/.test(dmy)) return dmy;
  const parts = dmy.split('/');
  if (parts.length !== 3) return dmy;
  const [d,m,y] = parts;
  if (!d || !m || !y || y.length < 4) return '';
  return y + '-' + m.padStart(2,'0') + '-' + d.padStart(2,'0');
}
function pickerToText(pickerId, textId) {
  const picker = document.getElementById(pickerId);
  const text = document.getElementById(textId);
  if (picker.value) text.value = toDisplay(picker.value);
}

function formatDateInput(input) {
  let v = input.value.replace(/[^0-9]/g,'');
  if (v.length > 8) v = v.slice(0,8);
  let out = '';
  if (v.length > 4) out = v.slice(0,2)+'/'+v.slice(2,4)+'/'+v.slice(4);
  else if (v.length > 2) out = v.slice(0,2)+'/'+v.slice(2);
  else out = v;
  input.value = out;
  // Sync to hidden picker if complete date
  const internal = toInternal(out);
  if (internal && /^\d{4}-\d{2}-\d{2}$/.test(internal)) {
    const pickerId = input.id === 'fStart' ? 'fStartPicker' : input.id === 'fEnd' ? 'fEndPicker' : null;
    if (pickerId) { const p = document.getElementById(pickerId); if(p) p.value = internal; }
  }
}

// Simple equirectangular projection
// SVG world map path data (simplified Natural Earth)
// Mappa Mindo001.jpg: 900x614, Mercator calibrata con 6 punti noti
const PNG_RATIO = 900 / 614;  // 1.4657
const PNG_LON_WEST  = -165.1615;
const PNG_LON_RANGE = 350.4663;
const _MERC_MAX_VAL = 3.046100;
const _MERC_RANGE_VAL = 4.160430;

function _mercY(latDeg) {
  const lr = Math.max(-85, Math.min(85, latDeg)) * Math.PI / 180;
  return Math.log(Math.tan(Math.PI / 4 + lr / 2));
}

function latlonToXY(lat, lon, w, h) {
  // w e h sono le dimensioni reali della SVG (mapW x mapH)
  const x = (lon - PNG_LON_WEST) / PNG_LON_RANGE * w;
  const y = (_MERC_MAX_VAL - _mercY(lat)) / _MERC_RANGE_VAL * h;
  return [x, y];
}

let mapScale = 1;
let mapTranslateX = 0;
let mapTranslateY = 0;
let mapZoomInitialized = false;

function initMapZoomPan() {
  // Scroll nativo orizzontale - nessun JS necessario
  // Il centering sulle bandierine viene fatto dopo il render
}

function centerMapOnPins() {
  const container = document.getElementById('mapContainer');
  const svg = document.getElementById('worldSvg');
  if (!container || !svg) return;
  const pinsGroup = document.getElementById('mapPinsGroup');
  if (!pinsGroup || !pinsGroup.children.length) {
    container.scrollLeft = (svg.clientWidth - container.clientWidth) / 2;
    return;
  }
  let sumX = 0, count = 0;
  [...pinsGroup.children].forEach(pin => {
    const ox = parseFloat(pin.getAttribute('data-ox'));
    if (!isNaN(ox)) { sumX += ox; count++; }
  });
  if (count > 0) {
    container.scrollLeft = sumX / count - container.clientWidth / 2;
  } else {
    container.scrollLeft = (svg.clientWidth - container.clientWidth) / 2;
  }
}



// ─── PIN SYSTEM ──────────────────────────────────────────────────────
const PIN_KEY = 'steccometro_pin';
const PIN_SET_KEY = 'steccometro_pin_set';
let pinBuffer = '';
let pinMode = 'unlock';
let pinTemp = '';

function pinHash(s) {
  let h = 0;
  for (let i = 0; i < s.length; i++) h = Math.imul(31, h) + s.charCodeAt(i) | 0;
  return h.toString(36);
}
function pinPress(d) {
  if (pinBuffer.length >= 6) return;
  pinBuffer += d;
  updatePinDots();
  if (pinBuffer.length === 6) setTimeout(handlePinComplete, 120);
}
function pinDel() { pinBuffer = pinBuffer.slice(0,-1); updatePinDots(); }
function updatePinDots(state) {
  for (let i=0;i<6;i++) {
    const dot = document.getElementById('dot-'+i);
    dot.className='pin-dot';
    if (state==='error') dot.classList.add('error');
    else if (i<pinBuffer.length) dot.classList.add('filled');
  }
}
function handlePinComplete() {
  const stored = localStorage.getItem(PIN_KEY);
  const isSet = localStorage.getItem(PIN_SET_KEY);
  if (!isSet) {
    if (pinMode==='set') {
      pinTemp=pinBuffer; pinBuffer=''; pinMode='confirm';
      document.getElementById('pin-title').textContent='CONFERMA PIN';
      document.getElementById('pin-sub').textContent='Ripeti le 6 cifre';
      updatePinDots();
    } else if (pinMode==='confirm') {
      if (pinBuffer===pinTemp) {
        localStorage.setItem(PIN_KEY,pinHash(pinBuffer));
        localStorage.setItem(PIN_SET_KEY,'1');
        unlockApp();
      } else { pinError('PIN NON CORRISPONDE'); }
    }
  } else {
    if (pinHash(pinBuffer)===stored) unlockApp();
    else pinError('PIN ERRATO');
  }
}
function pinError(msg) {
  updatePinDots('error');
  document.getElementById('pin-sub').textContent=msg;
  document.getElementById('pin-dots').classList.add('pin-shake');
  setTimeout(()=>{
    pinBuffer=''; updatePinDots();
    document.getElementById('pin-dots').classList.remove('pin-shake');
    document.getElementById('pin-sub').textContent='6 cifre per accedere';
  },800);
}
function unlockApp() {
  document.getElementById('pin-overlay').style.display='none';
}
function initPin() {
  const overlay = document.getElementById('pin-overlay');
  overlay.style.display='flex';
  const isSet=localStorage.getItem(PIN_SET_KEY);
  if (!isSet) {
    pinMode='set';
    document.getElementById('pin-title').textContent='CREA PIN';
    document.getElementById('pin-sub').textContent='Scegli 6 cifre';
  } else {
    pinMode='unlock';
    document.getElementById('pin-title').textContent='INSERISCI PIN';
    document.getElementById('pin-sub').textContent='6 cifre per accedere';
  }
  updateFaceIDUI();
  if (isSet && localStorage.getItem(FACE_ID_ENABLED_KEY) === '1') {
    setTimeout(() => unlockWithFaceID(), 350);
  }
}

// ─── CAMBIA PIN ───────────────────────────────────────────────────────
let cambiaBuffer='', cambiaStep='vecchia', cambiaNuovaTemp='';

function showCambiaPin() {
  cambiaBuffer=''; cambiaStep='vecchia'; cambiaNuovaTemp='';
  document.getElementById('cambia-pin-overlay').style.display='flex';
  setCambiaTitle('VECCHIA PASSWORD','Inserisci le 6 cifre attuali');
  updateCambiaDots();
}
function hideCambiaPin() {
  document.getElementById('cambia-pin-overlay').style.display='none';
}
function setCambiaTitle(t,s) {
  document.getElementById('cambia-pin-title').textContent=t;
  document.getElementById('cambia-pin-sub').textContent=s;
}
function cambiaPress(d) {
  if (cambiaBuffer.length>=6) return;
  cambiaBuffer+=d; updateCambiaDots();
  if (cambiaBuffer.length===6) setTimeout(handleCambiaComplete,120);
}
function cambiaDel() { cambiaBuffer=cambiaBuffer.slice(0,-1); updateCambiaDots(); }
function updateCambiaDots(state) {
  for (let i=0;i<6;i++) {
    const dot=document.getElementById('cpd-'+i);
    dot.className='pin-dot';
    if (state==='error') dot.classList.add('error');
    else if (i<cambiaBuffer.length) dot.classList.add('filled');
  }
}
function handleCambiaComplete() {
  if (cambiaStep==='vecchia') {
    if (pinHash(cambiaBuffer)===localStorage.getItem(PIN_KEY)) {
      cambiaBuffer=''; cambiaStep='nuova';
      setCambiaTitle('NUOVA PASSWORD','Scegli 6 cifre'); updateCambiaDots();
    } else { cambiaError('PASSWORD ERRATA'); }
  } else if (cambiaStep==='nuova') {
    cambiaNuovaTemp=cambiaBuffer; cambiaBuffer=''; cambiaStep='conferma';
    setCambiaTitle('CONFERMA PASSWORD','Ripeti le 6 cifre'); updateCambiaDots();
  } else if (cambiaStep==='conferma') {
    if (cambiaBuffer===cambiaNuovaTemp) {
      localStorage.setItem(PIN_KEY,pinHash(cambiaBuffer));
      hideCambiaPin();
      alert('Password cambiata!');
    } else { cambiaError('LE PASSWORD NON CORRISPONDONO'); }
  }
}
function cambiaError(msg) {
  updateCambiaDots('error');
  document.getElementById('cambia-pin-sub').textContent=msg;
  document.getElementById('cambia-pin-dots').classList.add('pin-shake');
  setTimeout(()=>{
    cambiaBuffer=''; updateCambiaDots();
    document.getElementById('cambia-pin-dots').classList.remove('pin-shake');
    document.getElementById('cambia-pin-sub').textContent='6 cifre';
  },800);
}


// ─── BACKUP LOCALE ───────────────────────────────────────────────────
function exportBackup() {
  const payload = {
    app: 'Steccometro',
    version: 1,
    createdAt: new Date().toISOString(),
    missions
  };
  const blob = new Blob([JSON.stringify(payload, null, 2)], {type: 'application/json'});
  const date = new Date().toISOString().slice(0,10);
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `Steccometro-backup-${date}.json`;
  document.body.appendChild(a);
  a.click();
  setTimeout(() => { URL.revokeObjectURL(a.href); a.remove(); }, 500);
}

function importBackup() {
  const input = document.createElement('input');
  input.type = 'file';
  input.accept = 'application/json,.json';
  input.onchange = () => {
    const file = input.files && input.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = () => {
      try {
        const data = JSON.parse(reader.result);
        const imported = Array.isArray(data) ? data : data.missions;
        if (!Array.isArray(imported)) throw new Error('Formato non valido');
        if (!confirm('Importare questo backup? Le missioni presenti saranno sostituite.')) return;
        missions = imported.map(m => ({
          id: String(m.id || Date.now() + Math.random()),
          name: String(m.name || ''),
          nation: String(m.nation || ''),
          city: String(m.city || ''),
          start: String(m.start || ''),
          end: String(m.end || ''),
          pay: Number.isFinite(Number(m.pay)) ? Number(m.pay) : 0,
          pauses: Array.isArray(m.pauses) ? m.pauses.map(p => ({from:String(p.from || ''), to:String(p.to || '')})) : []
        }));
        save();
        goList();
        alert('Backup importato correttamente.');
      } catch (e) {
        alert('Backup non valido o non leggibile.');
      }
    };
    reader.readAsText(file);
  };
  input.click();
}

// ─── FACE ID / WEBAUTHN LOCALE ───────────────────────────────────────
const FACE_ID_ENABLED_KEY = 'steccometro_faceid_enabled';
const FACE_ID_CREDENTIAL_KEY = 'steccometro_faceid_credential';

function bufferToBase64Url(buffer) {
  const bytes = new Uint8Array(buffer);
  let binary = '';
  bytes.forEach(b => binary += String.fromCharCode(b));
  return btoa(binary).replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/g, '');
}
function base64UrlToBuffer(value) {
  const b64 = value.replace(/-/g, '+').replace(/_/g, '/') + '='.repeat((4 - value.length % 4) % 4);
  const binary = atob(b64);
  const bytes = new Uint8Array(binary.length);
  for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
  return bytes.buffer;
}
function randomChallenge(length = 32) {
  const bytes = new Uint8Array(length);
  crypto.getRandomValues(bytes);
  return bytes;
}
function faceIDAvailable() {
  return window.PublicKeyCredential && navigator.credentials && window.isSecureContext;
}
function updateFaceIDUI() {
  const enabled = localStorage.getItem(FACE_ID_ENABLED_KEY) === '1' && localStorage.getItem(FACE_ID_CREDENTIAL_KEY);
  const btn = document.getElementById('faceid-unlock-btn');
  if (btn) btn.style.display = enabled ? 'block' : 'none';
  const menuBtn = document.getElementById('faceid-menu-btn');
  if (menuBtn) menuBtn.textContent = enabled ? '👤 FACE ID ATTIVO' : '👤 ABILITA FACE ID';
}
async function enableFaceID() {
  if (!faceIDAvailable()) {
    alert('Face ID richiede Safari/iOS in modalità sicura, di solito aprendo l’app da una pagina HTTPS e aggiungendola alla schermata Home.');
    return;
  }
  try {
    const credential = await navigator.credentials.create({
      publicKey: {
        challenge: randomChallenge(),
        rp: { name: 'Steccometro' },
        user: {
          id: randomChallenge(16),
          name: 'steccometro-locale',
          displayName: 'Steccometro locale'
        },
        pubKeyCredParams: [{ type: 'public-key', alg: -7 }, { type: 'public-key', alg: -257 }],
        authenticatorSelection: {
          authenticatorAttachment: 'platform',
          userVerification: 'required'
        },
        timeout: 60000,
        attestation: 'none'
      }
    });
    localStorage.setItem(FACE_ID_CREDENTIAL_KEY, bufferToBase64Url(credential.rawId));
    localStorage.setItem(FACE_ID_ENABLED_KEY, '1');
    updateFaceIDUI();
    alert('Face ID abilitato su questo dispositivo.');
  } catch (e) {
    alert('Face ID non è stato abilitato.');
  }
}
async function unlockWithFaceID() {
  if (!faceIDAvailable()) {
    alert('Face ID non è disponibile in questo ambiente.');
    return;
  }
  const credentialId = localStorage.getItem(FACE_ID_CREDENTIAL_KEY);
  if (!credentialId) {
    alert('Face ID non è ancora abilitato.');
    return;
  }
  try {
    await navigator.credentials.get({
      publicKey: {
        challenge: randomChallenge(),
        allowCredentials: [{ type: 'public-key', id: base64UrlToBuffer(credentialId) }],
        userVerification: 'required',
        timeout: 60000
      }
    });
    unlockApp();
  } catch (e) {
    document.getElementById('pin-sub').textContent = 'Face ID non riuscito. Usa il PIN.';
  }
}
