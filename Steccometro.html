    background-size: 280px auto;
    background-repeat: repeat;
    color: var(--text);
    height: 100dvh;
    overflow: hidden;
    position: relative;
  }

  /* dark overlay on camo image */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.38);
    pointer-events: none;
    z-index: 0;
  }

  .app {
    position: relative; z-index: 1;
    display: flex; flex-direction: column;
    height: 100dvh;
    padding-top: var(--safe-top);
    padding-bottom: var(--safe-bot);
  }

  /* HEADER */
  .header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 10px 16px 8px;
    border-bottom: 1px solid var(--border);
    background: rgba(0,0,0,0.72);
    backdrop-filter: blur(4px);
    flex-shrink: 0;
  }

  .header-star {
    font-size: 28px; line-height: 1;
  }

  .header-title {
    font-size: 24px; font-weight: 900; letter-spacing: 4px;
    color: var(--gold); text-transform: uppercase; text-shadow: 0 2px 8px rgba(0,0,0,0.8);
  }

  .header-right { width: 36px; text-align: right; }

  /* VIEWS */
  .view { display: none; flex-direction: column; flex: 1; overflow: hidden; }
  .view.active { display: flex; }

  /* LIST VIEW */
  .missions-list {
    flex: 1; overflow-y: auto; padding: 12px;
    display: flex; flex-direction: column; gap: 10px;
  }

  .mission-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 12px 14px;
    display: flex; align-items: center; gap: 12px;
    cursor: pointer;
    transition: background 0.15s;
  }
  .mission-card:active { background: rgba(245,197,24,0.1); }

  .mission-card-flag { font-size: 28px; line-height: 1; flex-shrink: 0; }
  .mission-card-info { flex: 1; min-width: 0; }
  .mission-card-name {
    font-size: 17px; font-weight: 900; color: var(--gold);
    letter-spacing: 1px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .mission-card-sub { font-size: 13px; color: var(--textDim); margin-top: 3px; font-weight: bold; }
  .mission-card-arrow { color: var(--textDim); font-size: 18px; }

  .btn-add {
    position: fixed; bottom: calc(20px + var(--safe-bot)); right: 20px;
    width: 52px; height: 52px; border-radius: 50%;
    background: var(--gold); color: var(--camo5);
    font-size: 28px; font-weight: bold;
    border: none; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 2px 12px rgba(0,0,0,0.5);
    z-index: 10;
    transition: transform 0.1s;
  }
  .btn-add:active { transform: scale(0.93); }
  .btn-totale {
    position: fixed; bottom: calc(20px + var(--safe-bot)); left: 20px;
    height: 44px; padding: 0 18px;
    border-radius: 22px;
    background: rgba(10,10,10,0.88); color: var(--gold);
    font-size: 14px; font-weight: 900; letter-spacing: 2px;
    border: 2px solid var(--gold); cursor: pointer;
    z-index: 10; font-family: 'Courier New', monospace;
    transition: transform 0.1s;
    box-shadow: 0 2px 12px rgba(0,0,0,0.5);
  }
  .btn-totale:active { transform: scale(0.95); }
  .btn-map {
    position: fixed; bottom: calc(20px + var(--safe-bot)); left: 50%;
    transform: translateX(-50%);
    width: 52px; height: 52px; border-radius: 50%;
    background: #1565c0; color: #fff;
    font-size: 24px;
    border: 2px solid #42a5f5; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 2px 12px rgba(0,0,0,0.5);
    z-index: 10;
    transition: transform 0.1s;
  }
  .btn-map:active { transform: translateX(-50%) scale(0.93); }
  .map-pin {
    position: absolute;
    transform: translate(-50%, -100%);
    font-size: 22px;
    cursor: pointer;
    filter: drop-shadow(0 2px 3px rgba(0,0,0,0.8));
    z-index: 5;
  }
  .map-tooltip {
    position: absolute;
    background: rgba(0,0,0,0.88);
    border: 1px solid var(--gold);
    border-radius: 4px;
    padding: 4px 8px;
    font-size: 11px;
    color: var(--gold);
    font-weight: bold;
    white-space: nowrap;
    pointer-events: none;
    transform: translate(-50%, -110%);
    z-index: 10;
  }

  .empty-state {
    text-align: center; padding: 40px 20px;
    color: var(--textDim); font-size: 13px; line-height: 1.8;
  }
  .empty-star { font-size: 40px; margin-bottom: 8px; }

  /* FORM VIEW */
  .form-scroll { flex: 1; overflow-y: auto; padding: 10px 14px; }

  .form-group { margin-bottom: 10px; }
  .form-label {
    font-size: 12px; letter-spacing: 2px; color: var(--gold);
    text-transform: uppercase; margin-bottom: 4px; display: block;
    background: rgba(0,0,0,0.72); padding: 3px 8px; border-radius: 3px;
  }
  .form-row { display: flex; gap: 8px; align-items: flex-start; }

  input, select {
    width: 100%;
    background: rgba(26,36,16,0.9);
    border: 1px solid var(--border);
    border-radius: 4px;
    color: var(--text);
    font-family: 'Courier New', monospace;
    font-size: 15px;
    padding: 9px 10px; font-weight: bold;
    outline: none;
    -webkit-appearance: none;
  }
  input:focus, select:focus { border-color: var(--gold); }
  select option { background: var(--camo1); }

  .flag-display {
    font-size: 28px; line-height: 38px; flex-shrink: 0;
    width: 42px; text-align: center;
    background: rgba(26,36,16,0.9);
    border: 1px solid var(--border);
    border-radius: 4px;
  }

  /* PAUSES */
  .pause-list { display: flex; flex-direction: column; gap: 6px; margin-bottom: 6px; }
  .pause-item {
    display: flex; gap: 6px; align-items: center;
    background: rgba(26,36,16,0.6);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 5px 8px;
  }
  .pause-item input { flex: 1; min-width: 0; }
  .btn-rm-pause {
    background: none; border: none; color: var(--red);
    font-size: 18px; cursor: pointer; padding: 0 4px; flex-shrink: 0;
  }
  .btn-add-pause {

<body>

<div class="app">

  <!-- HEADER -->
  <div class="header">
    <div class="header-star" id="headerLeft">⭐</div>
    <div class="header-title" id="headerTitle">STECCOMETRO</div>
    <div class="header-right" id="headerRight"></div>
  </div>

  <!-- LIST VIEW -->
  <div class="view active" id="viewList">
    <div class="missions-list" id="missionsList"></div>
    <button class="btn-add" id="btnAdd" onclick="openNew()">+</button>
    <button class="btn-map" id="btnMap" onclick="openMap()">🗺</button>
    <button class="btn-totale" id="btnTotale" onclick="openTotale()">TOTALE</button>
  </div>

  <!-- FORM VIEW (new/edit) -->
  <div class="view" id="viewForm">
    <div class="form-scroll">
      <div class="form-group">
        <label class="form-label">Nome Missione</label>
        <input type="text" id="fName" placeholder="Es. TOURING BLUES 2025">
      </div>
      <div class="form-group">
        <label class="form-label">Nazione</label>
        <div class="form-row">
          <select id="fNation" onchange="updateFlag()" style="flex:1">
            <option value="">— seleziona —</option>
          </select>
          <div class="flag-display" id="fFlag">🌍</div>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Città</label>
        <input type="text" id="fCity" placeholder="Es. Milano">
      </div>
      <div class="form-group form-row" style="gap:8px">
        <div style="flex:1">
          <label class="form-label">Inizio Mix</label>
          <div style="position:relative">
            <input type="text" id="fStart" placeholder="GG/MM/AAAA" maxlength="10" oninput="formatDateInput(this)" style="padding-right:36px">
            <input type="date" id="fStartPicker" style="position:absolute;right:0;top:0;width:36px;height:100%;opacity:0;cursor:pointer;z-index:2" onchange="pickerToText('fStartPicker','fStart')">
            <span style="position:absolute;right:8px;top:50%;transform:translateY(-50%);font-size:18px;pointer-events:none;z-index:1">📅</span>
          </div>
        </div>
        <div style="flex:1">
          <label class="form-label">Fine Mix</label>
          <div style="position:relative">
            <input type="text" id="fEnd" placeholder="GG/MM/AAAA" maxlength="10" oninput="formatDateInput(this)" style="padding-right:36px">
            <input type="date" id="fEndPicker" style="position:absolute;right:0;top:0;width:36px;height:100%;opacity:0;cursor:pointer;z-index:2" onchange="pickerToText('fEndPicker','fEnd')">
            <span style="position:absolute;right:8px;top:50%;transform:translateY(-50%);font-size:18px;pointer-events:none;z-index:1">📅</span>
          </div>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Paga Giornaliera (€)</label>
        <input type="number" id="fPay" placeholder="Es. 350" min="0" step="1">
      </div>
      <div class="section-divider">✦ PAUSE ✦</div>
      <div class="form-group" style="margin-top:6px">
        <div class="pause-list" id="pauseList"></div>
        <button class="btn-add-pause" onclick="addPause()">+ Aggiungi Pausa</button>
      </div>
    </div>
    <div class="form-actions">
      <button class="btn btn-back" onclick="goList()">← INDIETRO</button>
      <button class="btn btn-primary" onclick="saveMission()">SALVA ✦</button>
      <button class="btn btn-danger" id="btnDelete" onclick="deleteMission()" style="display:none">🗑</button>
    </div>
  </div>

  <!-- TOTALE VIEW -->
  <div class="view" id="viewTotale">
    <div class="detail-scroll" id="totaleContent"></div>
    <div class="form-actions">
      <button class="btn btn-back" onclick="goList()">← INDIETRO</button>
    </div>
  </div>

  <!-- MAP VIEW -->
  <div class="view" id="viewMap">
    <div style="flex:1;overflow:hidden;position:relative;touch-action:none;cursor:grab;" id="mapContainer">
      <div id="mapPins"></div>
    </div>
    <div class="form-actions">
      <button class="btn btn-back" onclick="goList()">← INDIETRO</button>
    </div>
  </div>

  <!-- DETAIL VIEW -->
  <div class="view" id="viewDetail">
    <div class="detail-scroll" id="detailContent"></div>
    <div class="form-actions">
      <button class="btn btn-back" onclick="goList()">← INDIETRO</button>
      <button class="btn btn-primary" onclick="editCurrent()">✏ MODIFICA</button>
    </div>
  </div>

</div>

  ["🇪🇸","Spagna"],["🇱🇰","Sri Lanka"],["🇺🇸","Stati Uniti"],
  ["🇿🇦","Sud Africa"],["🇸🇸","Sud Sudan"],["🇸🇩","Sudan"],["🇸🇷","Suriname"],
  ["🇸🇪","Svezia"],["🇨🇭","Svizzera"],["🇹🇭","Tailandia"],["🇹🇼","Taiwan"],
  ["🇹🇯","Tagikistan"],["🇹🇿","Tanzania"],["🇹🇱","Timor Est"],["🇹🇬","Togo"],
  ["🇹🇴","Tonga"],["🇹🇹","Trinidad e Tobago"],["🇹🇳","Tunisia"],["🇹🇷","Turchia"],

  ["🇻🇪","Venezuela"],["🇻🇳","Vietnam"],["🇾🇪","Yemen"],["🇿🇲","Zambia"],
  ["🇿🇼","Zimbabwe"]
];

let missions = [];
let editingId = null;
let detailTimer = null;
let pauseItems = [];

// ─── STORAGE ────────────────────────────────────────────────────────
function load() {
  try { missions = JSON.parse(localStorage.getItem('stecco_missions') || '[]'); } catch(e) { missions = []; }
}
function save() {
  localStorage.setItem('stecco_missions', JSON.stringify(missions));
}

// ─── INIT ────────────────────────────────────────────────────────────
function init() {
  load();
  const sel = document.getElementById('fNation');
  NATIONS.forEach(([f,n]) => {
    const o = document.createElement('option');
    o.value = n; o.textContent = f + ' ' + n;
    sel.appendChild(o);
  });
  renderList();
}

// ─── LIST ────────────────────────────────────────────────────────────
function renderList() {
  const el = document.getElementById('missionsList');
  el.innerHTML = '';
  if (!missions.length) {
    el.innerHTML = '<div class="empty-state"><div class="empty-star">⭐</div>Nessuna missione.<br>Premi + per crearne una.</div>';
    return;
  }
  missions.forEach(m => {
    const flag = getFlagFor(m.nation);
    const days = calcWorkDays(m);
    const pct = calcPercent(m);
    const div = document.createElement('div');
    div.className = 'mission-card';
    div.onclick = () => openDetail(m.id);
    div.innerHTML = `
      <div class="mission-card-flag">${flag}</div>
      <div class="mission-card-info">
        <div class="mission-card-name">${m.name||'Senza nome'}</div>
        <div class="mission-card-sub">${m.city||''}${m.city&&m.nation?' · ':''}${m.nation||''}</div>
        <div class="mission-card-sub">${toDisplay(m.start)||'?'} → ${toDisplay(m.end)||'?'} · ${days} gg lav. · €${fmt((m.pay||0)*days)}</div>
      </div>
      <div style="font-size:20px;color:${pct>=100?'#27ae60':pct>0?'#f5c518':'#555'}">›</div>
    `;
    el.appendChild(div);
  });
}

// ─── FLAG ────────────────────────────────────────────────────────────
function getFlagFor(nation) {
  const n = NATIONS.find(([f,nm]) => nm === nation);
  return n ? n[0] : '🌍';
}
function updateFlag() {
  const v = document.getElementById('fNation').value;
  document.getElementById('fFlag').textContent = getFlagFor(v);
}

// ─── NAVIGATION ─────────────────────────────────────────────────────
function showView(id) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}
function goList() {
  if (detailTimer) { clearInterval(detailTimer); detailTimer = null; }
  showView('viewList');
  document.getElementById('headerLeft').textContent = '⭐';
  document.getElementById('headerTitle').textContent = 'STECCOMETRO';
  document.getElementById('headerRight').innerHTML = '';
  document.getElementById('btnAdd').style.display = '';
  document.getElementById('btnMap').style.display = '';
  const bt = document.getElementById('btnTotale');
  if (bt) bt.style.display = '';
  renderList();
}

// ─── NEW ─────────────────────────────────────────────────────────────
function openNew() {
  editingId = null;
  pauseItems = [];
  document.getElementById('fName').value = '';
  document.getElementById('fNation').value = '';
  document.getElementById('fFlag').textContent = '🌍';
  document.getElementById('fCity').value = '';
  document.getElementById('fStart').value = '';
  document.getElementById('fEnd').value = '';
  document.getElementById('fPay').value = '';
  renderPauseList();
  document.getElementById('btnDelete').style.display = 'none';
  document.getElementById('btnAdd').style.display = 'none';
  document.getElementById('btnMap').style.display = 'none';
  document.getElementById('headerTitle').textContent = 'NUOVA MISSIONE';
  showView('viewForm');
}

// ─── EDIT ─────────────────────────────────────────────────────────────
function editCurrent() {
  if (!editingId) return;
  const m = missions.find(x => x.id === editingId);
  if (!m) return;
  if (detailTimer) { clearInterval(detailTimer); detailTimer = null; }
  pauseItems = (m.pauses||[]).map(p => ({...p}));
  document.getElementById('fName').value = m.name||'';
  document.getElementById('fNation').value = m.nation||'';
  updateFlag();
  document.getElementById('fCity').value = m.city||'';
  document.getElementById('fStart').value = toDisplay(m.start||'');
  document.getElementById('fEnd').value = toDisplay(m.end||'');
  document.getElementById('fStartPicker').value = m.start||'';
  document.getElementById('fEndPicker').value = m.end||'';
  document.getElementById('fPay').value = m.pay||'';
  renderPauseList();
  document.getElementById('btnDelete').style.display = '';
  document.getElementById('btnAdd').style.display = 'none';
  document.getElementById('btnMap').style.display = 'none';
  document.getElementById('headerTitle').textContent = 'MODIFICA';
  showView('viewForm');
}

// ─── PAUSE LIST ───────────────────────────────────────────────────────
function renderPauseList() {
  const el = document.getElementById('pauseList');
  el.innerHTML = '';
  pauseItems.forEach((p,i) => {
    const div = document.createElement('div');
    div.className = 'pause-item';
    div.innerHTML = `
      <span style="font-size:10px;color:var(--gold);font-weight:bold;flex-shrink:0;background:rgba(0,0,0,0.72);padding:2px 5px;border-radius:2px">DA</span>
      <div style="position:relative;flex:1;min-width:0"><input type="text" value="${toDisplay(p.from||'')||''}" id="pFrom${i}" onchange="pauseItems[${i}].from=toInternal(this.value)" oninput="formatDateInput(this)" placeholder="GG/MM/AAAA" maxlength="10" style="width:100%;padding-right:28px"><input type="date" style="position:absolute;right:0;top:0;width:28px;height:100%;opacity:0;cursor:pointer;z-index:2" value="${p.from||''}" onchange="pauseItems[${i}].from=this.value;document.getElementById('pFrom${i}').value=toDisplay(this.value)"><span style="position:absolute;right:4px;top:50%;transform:translateY(-50%);font-size:14px;pointer-events:none">📅</span></div>
      <span style="font-size:10px;color:var(--gold);font-weight:bold;flex-shrink:0;background:rgba(0,0,0,0.72);padding:2px 5px;border-radius:2px">AL</span>
      <div style="position:relative;flex:1;min-width:0"><input type="text" value="${toDisplay(p.to||'')||''}" id="pTo${i}" onchange="pauseItems[${i}].to=toInternal(this.value)" oninput="formatDateInput(this)" placeholder="GG/MM/AAAA" maxlength="10" style="width:100%;padding-right:28px"><input type="date" style="position:absolute;right:0;top:0;width:28px;height:100%;opacity:0;cursor:pointer;z-index:2" value="${p.to||''}" onchange="pauseItems[${i}].to=this.value;document.getElementById('pTo${i}').value=toDisplay(this.value)"><span style="position:absolute;right:4px;top:50%;transform:translateY(-50%);font-size:14px;pointer-events:none">📅</span></div>
      <button class="btn-rm-pause" onclick="removePause(${i})">×</button>
    `;
    el.appendChild(div);
  });
}
function addPause() {
  pauseItems.push({from:'',to:''});
  renderPauseList();
}
function removePause(i) {
  pauseItems.splice(i,1);
  renderPauseList();
}

// ─── SAVE ────────────────────────────────────────────────────────────
function saveMission() {
  const name = document.getElementById('fName').value.trim();
  const nation = document.getElementById('fNation').value;
  const city = document.getElementById('fCity').value.trim();
  const start = toInternal(document.getElementById('fStart').value);
  const end = toInternal(document.getElementById('fEnd').value);
  const pay = parseFloat(document.getElementById('fPay').value)||0;

  if (!name) { alert('Inserisci il nome della missione.'); return; }
  if (!start || !end) { alert('Inserisci le date di inizio e fine.'); return; }
  if (start > end) { alert('La data di inizio deve essere prima della fine.'); return; }

  const pauses = pauseItems.filter(p => p.from && p.to && p.from <= p.to);

  if (editingId) {
    const idx = missions.findIndex(x => x.id === editingId);
    if (idx >= 0) missions[idx] = { id: editingId, name, nation, city, start, end, pay, pauses };
  } else {
    missions.push({ id: Date.now().toString(), name, nation, city, start, end, pay, pauses });
  }
  save();
  goList();
}

// ─── DELETE ──────────────────────────────────────────────────────────
function deleteMission() {
  if (!confirm('Eliminare questa missione?')) return;
  missions = missions.filter(x => x.id !== editingId);
  save();
  editingId = null;
  goList();
}

// ─── CALC ────────────────────────────────────────────────────────────
function dateToMs(s) { return new Date(s+'T00:00:00').getTime(); }

function fmt(n) {
  const num = Number(n);
  const parts = num.toFixed(2).split('.');
  parts[0] = parts[0].replace(/\B(?=(\d{3})+(?!\d))/g, '.');
  return parts.join(',');
}

function calcPauseDays(pauses, start, end) {
  if (!pauses || !pauses.length) return 0;
  let total = 0;
  const s = dateToMs(start), e = dateToMs(end);
  pauses.forEach(p => {
    if (!p.from || !p.to) return;
    const ps = Math.max(dateToMs(p.from), s);
    const pe = Math.min(dateToMs(p.to), e);
    if (pe >= ps) total += Math.round((pe - ps) / 86400000) + 1;
  });
  return total;
}

function calcTotalDays(m) {
  if (!m.start || !m.end) return 0;
  return Math.round((dateToMs(m.end) - dateToMs(m.start)) / 86400000) + 1;
}

function calcWorkDays(m) {
  return Math.max(0, calcTotalDays(m) - calcPauseDays(m.pauses, m.start, m.end));
}

function calcDaysDone(m) {
  if (!m.start || !m.end) return 0;
  const now = Date.now();
  const s = dateToMs(m.start), e = dateToMs(m.end);
  if (now < s) return 0;
  if (now > e) return calcWorkDays(m);
  const calendarDone = Math.round((now - s) / 86400000);
  const pauses = m.pauses||[];
  let pauseConsumed = 0;
  const today = new Date().toISOString().split('T')[0];
  pauses.forEach(p => {
    if (!p.from || !p.to) return;
    const ps = Math.max(dateToMs(p.from), s);
    const pe = Math.min(dateToMs(p.to), dateToMs(today));
    if (pe >= ps) pauseConsumed += Math.round((pe - ps) / 86400000) + 1;
  });
  return Math.max(0, calendarDone - pauseConsumed);
}

function calcPercent(m) {
  const total = calcWorkDays(m);
  if (!total) return 0;
  return Math.min(100, Math.round(calcDaysDone(m) / total * 100));
}

function calcEarned(m) {
  if (!m.start || !m.end || !m.pay) return 0;
  const now = Date.now();
  const s = dateToMs(m.start);
  const e = dateToMs(m.end) + 86400000 - 1;
  if (now < s) return 0;
  const totalWork = calcWorkDays(m);
  if (totalWork <= 0) return 0;
  const payPerDay = m.pay;
  // Calculate work-seconds elapsed, excluding pauses
  const cap = Math.min(now, e);
  let totalCalSec = (cap - s) / 1000;
  // subtract pause seconds that have elapsed
  (m.pauses||[]).forEach(p => {
    if (!p.from || !p.to) return;
    const ps = dateToMs(p.from);
    const pe = dateToMs(p.to) + 86400000 - 1;
    const os = Math.max(ps, s);
    const oe = Math.min(pe, cap);
    if (oe > os) totalCalSec -= (oe - os) / 1000;
  });
  totalCalSec = Math.max(0, totalCalSec);
  // work seconds in total calendar = totalWork days * 86400
  const totalWorkSec = totalWork * 86400;
  return Math.min(payPerDay * totalWork, (payPerDay * totalWork) * (totalCalSec / totalWorkSec));
}

// ─── DETAIL ──────────────────────────────────────────────────────────
function openDetail(id) {
  editingId = id;
  const m = missions.find(x => x.id === id);
  if (!m) return;
  document.getElementById('headerTitle').textContent = (m.name||'MISSIONE').substring(0,14).toUpperCase();
  document.getElementById('btnAdd').style.display = 'none';
  document.getElementById('btnMap').style.display = 'none';
  showView('viewDetail');
  renderDetail(m);
  if (detailTimer) clearInterval(detailTimer);
  detailTimer = setInterval(() => {
    const mm = missions.find(x => x.id === id);
    if (mm) updateCounters(mm);
  }, 1000);
}

        <div class="detail-sub">${toDisplay(m.start)||'?'} → ${toDisplay(m.end)||'?'}</div>
      </div>
    </div>

    <div class="timeline-section">
      <div class="timeline-label">⬛ Timeline · ${totalDays} gg cal. · ${pauseDays} gg pausa</div>
      <div style="display:flex;align-items:center;gap:12px">

function drawPie(pct, pauseFrac) {
  const canvas = document.getElementById('pieChart');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;
  const cx = W/2, cy = H/2, r = W/2 - 3;
  ctx.clearRect(0,0,W,H);
  const TAU = Math.PI * 2;
  const start = -Math.PI/2;
  const doneFrac = pct/100;
  const pauseF = Math.min(pauseFrac, 1 - doneFrac);
  const remFrac = Math.max(0, 1 - doneFrac - pauseF);

  function arc(from, to, color) {
    if (to <= from) return;
    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.arc(cx, cy, r, from, to);
    ctx.closePath();
    ctx.fillStyle = color;
    ctx.fill();
  }
  // background full circle grey
  ctx.beginPath(); ctx.arc(cx,cy,r,0,TAU); ctx.fillStyle='#333'; ctx.fill();
  // pause slice (grey, after done)
  arc(start + doneFrac*TAU, start + (doneFrac+pauseF)*TAU, '#555');
  // remaining slice (red)
  if (remFrac > 0) arc(start + (doneFrac+pauseF)*TAU, start + TAU, '#e63946');
  // done slice (green)
  if (doneFrac > 0) arc(start, start + doneFrac*TAU, '#2dc653');
  // center hole
  ctx.beginPath(); ctx.arc(cx,cy,r*0.48,0,TAU); ctx.fillStyle='rgba(10,10,10,0.9)'; ctx.fill();
}

function updateCounters(m) {
  const earned = calcEarned(m);
  const el = document.getElementById('dtEarned');
  if (el) el.textContent = '€' + fmt(earned);

  const pct = calcPercent(m);
  const done = calcDaysDone(m);
  const workDays = calcWorkDays(m);
  const totalDays = calcTotalDays(m);
  const pauseDays = calcPauseDays(m.pauses, m.start, m.end);
  const remaining = Math.max(0, workDays - done);
  const pauseFrac = totalDays > 0 ? pauseDays/totalDays : 0;

  drawPie(pct, pauseFrac);
  const piePct = document.getElementById('piePct');
  if (piePct) piePct.textContent = pct + '%';
  const dtDone = document.getElementById('dtDone');
  if (dtDone) dtDone.textContent = done;
  const dtRem = document.getElementById('dtRem');
  if (dtRem) dtRem.textContent = remaining;
}

function openTotale() {
  if (detailTimer) { clearInterval(detailTimer); detailTimer = null; }
  document.getElementById('headerTitle').textContent = 'RIEPILOGO';
  document.getElementById('btnAdd').style.display = 'none';
  document.getElementById('btnMap').style.display = 'none';
  document.getElementById('btnTotale').style.display = 'none';
  showView('viewTotale');
  renderTotale();
  detailTimer = setInterval(renderTotale, 1000);
}

function renderTotale() {
  const now = Date.now();
  let grandTotal = 0;
  let rows = '';
  missions.forEach(m => {
    const earned = calcEarned(m);
    const workDays = calcWorkDays(m);
    const total = (m.pay||0) * workDays;
    const flag = getFlagFor(m.nation);

    grandTotal += earned;
    rows += `
      <div style="background:var(--card);border:1px solid var(--border);border-radius:6px;padding:10px 12px;margin-bottom:8px;">

          </div>

}


// ─── DATE FORMAT HELPERS ─────────────────────────────────────────────
// Internal: YYYY-MM-DD, Display: DD/MM/YYYY
function toDisplay(iso) {
  if (!iso || iso.length < 10) return iso || '';
  const [y,m,d] = iso.split('-');
  if (!y || !m || !d) return iso;
  return d + '/' + m + '/' + y;
}
function toInternal(dmy) {
  if (!dmy) return '';
  // Already YYYY-MM-DD?
  if (/^\d{4}-\d{2}-\d{2}$/.test(dmy)) return dmy;
  const parts = dmy.split('/');
  if (parts.length !== 3) return dmy;
  const [d,m,y] = parts;
  if (!d || !m || !y || y.length < 4) return '';
  return y + '-' + m.padStart(2,'0') + '-' + d.padStart(2,'0');
}
function pickerToText(pickerId, textId) {
  const picker = document.getElementById(pickerId);
  const text = document.getElementById(textId);
  if (picker.value) text.value = toDisplay(picker.value);
}

function formatDateInput(input) {
  let v = input.value.replace(/[^0-9]/g,'');
  if (v.length > 8) v = v.slice(0,8);
  let out = '';
  if (v.length > 4) out = v.slice(0,2)+'/'+v.slice(2,4)+'/'+v.slice(4);
  else if (v.length > 2) out = v.slice(0,2)+'/'+v.slice(2);
  else out = v;
  input.value = out;
  // Sync to hidden picker if complete date
  const internal = toInternal(out);
  if (internal && /^\d{4}-\d{2}-\d{2}$/.test(internal)) {
    const pickerId = input.id === 'fStart' ? 'fStartPicker' : input.id === 'fEnd' ? 'fEndPicker' : null;
    if (pickerId) { const p = document.getElementById(pickerId); if(p) p.value = internal; }
  }
}

// Simple equirectangular projection
// SVG world map path data (simplified Natural Earth)
// PNG map: 1244x700, Mercator projection, lat 80/-65, lon -170/+190
const PNG_RATIO = 1244 / 700;
const PNG_LAT_MAX = 80;
const PNG_LAT_MIN = -65;
const PNG_LON_WEST = -170;

function _mercY(latDeg) {
  const lr = Math.max(-85, Math.min(85, latDeg)) * Math.PI / 180;
  return Math.log(Math.tan(Math.PI / 4 + lr / 2));
}
const _MERC_MAX = _mercY(PNG_LAT_MAX);
const _MERC_RANGE = _MERC_MAX - _mercY(PNG_LAT_MIN);

function latlonToXY(lat, lon, w, h) {
  // Account for preserveAspectRatio="meet" letterboxing
  let rW, rH, offX, offY;
  if (w / h > PNG_RATIO) {
    rH = h; rW = h * PNG_RATIO; offX = (w - rW) / 2; offY = 0;
  } else {
    rW = w; rH = w / PNG_RATIO; offX = 0; offY = (h - rH) / 2;
  }
  const x = (lon - PNG_LON_WEST) / 360 * rW + offX;
  const y = (_MERC_MAX - _mercY(lat)) / _MERC_RANGE * rH + offY;
  return [x, y];
}

  svgContent += '</svg>';

    if (!m.nation) return;
    if (!byNation[m.nation]) byNation[m.nation] = [];
    byNation[m.nation].push(m);
  });

  Object.entries(byNation).forEach(([nation, ms]) => {
    const coords = NATION_COORDS[nation];
    if (!coords) return;
    const [lat, lon] = coords;
    const [px, py] = latlonToXY(lat, lon, W, H);
    const flag = getFlagFor(nation);
    const count = ms.length;

    const g = document.createElementNS('http://www.w3.org/2000/svg','g');
    g.setAttribute('transform', `translate(${px.toFixed(1)},${py.toFixed(1)})`);
    g.setAttribute('data-ox', px.toFixed(1));
    g.setAttribute('data-oy', py.toFixed(1));

      const label = `${flag} ${nation}: ${names}`;
      const charW = 7;
      const tw = label.length * charW;
      const tx = Math.min(Math.max(px, tw/2+4), W - tw/2 - 4);

  initMapZoomPan();

// ─── MAP ZOOM & PAN ──────────────────────────────────────────────────
function initMapZoomPan() {
  const container = document.getElementById('mapContainer');
  const svg = document.getElementById('worldSvg');
  if (!container || !svg) return;

  let scale = 1;
  let translateX = 0;
  let translateY = 0;
  const MIN_SCALE = 1;
  const MAX_SCALE = 8;

  // Touch state
  let lastTouchDist = null;
  let lastTouchMid = null;
  let isDragging = false;
  let dragStart = null;
  let dragOrigin = null;

  function applyTransform() {
    const cW = container.clientWidth;
    const cH = container.clientHeight;
    const maxX = (scale - 1) * cW / 2;
    const maxY = (scale - 1) * cH / 2;
    translateX = Math.max(-maxX, Math.min(maxX, translateX));
    translateY = Math.max(-maxY, Math.min(maxY, translateY));

    // Scala solo l'immagine
    const imgGroup = document.getElementById('mapImageGroup');
    if (imgGroup) {
      imgGroup.setAttribute('transform',
        `translate(${(cW/2 + translateX).toFixed(1)},${(cH/2 + translateY).toFixed(1)}) scale(${scale}) translate(${(-cW/2).toFixed(1)},${(-cH/2).toFixed(1)})`
      );
    }
    // Riposiziona le pin mantenendo dimensione costante
    const pinsGroup = document.getElementById('mapPinsGroup');
    if (pinsGroup) {
      [...pinsGroup.children].forEach(pin => {
        const ox = parseFloat(pin.getAttribute('data-ox'));
        const oy = parseFloat(pin.getAttribute('data-oy'));
        if (!isNaN(ox) && !isNaN(oy)) {
          const nx = (ox - cW/2) * scale + cW/2 + translateX;
          const ny = (oy - cH/2) * scale + cH/2 + translateY;
          pin.setAttribute('transform', `translate(${nx.toFixed(1)},${ny.toFixed(1)})`);
        }
      });
    }
  }

  function getTouchDist(t1, t2) {
    const dx = t1.clientX - t2.clientX;
    const dy = t1.clientY - t2.clientY;
    return Math.sqrt(dx*dx + dy*dy);
  }
  function getTouchMid(t1, t2) {
    return { x: (t1.clientX + t2.clientX) / 2, y: (t1.clientY + t2.clientY) / 2 };
  }

  // ── TOUCH EVENTS ──
  container.addEventListener('touchstart', (e) => {
    if (e.touches.length === 2) {
      e.preventDefault();
      lastTouchDist = getTouchDist(e.touches[0], e.touches[1]);
      lastTouchMid = getTouchMid(e.touches[0], e.touches[1]);
      isDragging = false;
    } else if (e.touches.length === 1) {
      isDragging = true;
      dragStart = { x: e.touches[0].clientX, y: e.touches[0].clientY };
      dragOrigin = { x: translateX, y: translateY };
      container.style.cursor = 'grabbing';
    }
  }, { passive: false });

  container.addEventListener('touchmove', (e) => {
    if (e.touches.length === 2) {
      e.preventDefault();
      const dist = getTouchDist(e.touches[0], e.touches[1]);
      const mid = getTouchMid(e.touches[0], e.touches[1]);
      if (lastTouchDist) {
        const delta = dist / lastTouchDist;
        const newScale = Math.max(MIN_SCALE, Math.min(MAX_SCALE, scale * delta));
        // Zoom toward pinch midpoint
        const rect = container.getBoundingClientRect();
        const mx = mid.x - rect.left - container.clientWidth / 2;
        const my = mid.y - rect.top - container.clientHeight / 2;
        translateX = mx - (mx - translateX) * (newScale / scale);
        translateY = my - (my - translateY) * (newScale / scale);
        scale = newScale;
        // Pan with midpoint movement
        if (lastTouchMid) {
          translateX += mid.x - lastTouchMid.x;
          translateY += mid.y - lastTouchMid.y;
        }
      }
      lastTouchDist = dist;
      lastTouchMid = mid;
      applyTransform();
    } else if (e.touches.length === 1 && isDragging && dragStart) {
      e.preventDefault();
      const dx = e.touches[0].clientX - dragStart.x;
      const dy = e.touches[0].clientY - dragStart.y;
      translateX = dragOrigin.x + dx;
      translateY = dragOrigin.y + dy;
      applyTransform();
    }
  }, { passive: false });

  container.addEventListener('touchend', (e) => {
    if (e.touches.length < 2) { lastTouchDist = null; lastTouchMid = null; }
    if (e.touches.length === 0) { isDragging = false; container.style.cursor = 'grab'; }
  });

  // ── MOUSE EVENTS (desktop) ──
  container.addEventListener('mousedown', (e) => {
    isDragging = true;
    dragStart = { x: e.clientX, y: e.clientY };
    dragOrigin = { x: translateX, y: translateY };
    container.style.cursor = 'grabbing';
    e.preventDefault();
  });
  container.addEventListener('mousemove', (e) => {
    if (!isDragging) return;
    translateX = dragOrigin.x + (e.clientX - dragStart.x);
    translateY = dragOrigin.y + (e.clientY - dragStart.y);
    applyTransform();
  });
  container.addEventListener('mouseup', () => { isDragging = false; container.style.cursor = 'grab'; });
  container.addEventListener('mouseleave', () => { isDragging = false; container.style.cursor = 'grab'; });
  container.addEventListener('wheel', (e) => {
    e.preventDefault();
    const delta = e.deltaY > 0 ? 0.85 : 1.18;
    const newScale = Math.max(MIN_SCALE, Math.min(MAX_SCALE, scale * delta));
    const rect = container.getBoundingClientRect();
    const mx = e.clientX - rect.left - container.clientWidth / 2;
    const my = e.clientY - rect.top - container.clientHeight / 2;
    translateX = mx - (mx - translateX) * (newScale / scale);
    translateY = my - (my - translateY) * (newScale / scale);
    scale = newScale;
    applyTransform();
  }, { passive: false });

  // ── DOUBLE TAP to reset ──
  let lastTap = 0;
  container.addEventListener('touchend', (e) => {
    const now = Date.now();
    if (now - lastTap < 300 && e.changedTouches.length === 1) {
      scale = 1; translateX = 0; translateY = 0;
      applyTransform();
    }
    lastTap = now;
  });
}



// ─── START ───────────────────────────────────────────────────────────
init();
</script>
</body>
</html>
